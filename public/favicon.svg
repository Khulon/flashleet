<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Deck of 3 cards fanning to the right -->
  <rect x="7" y="3" width="18" height="24" rx="3" fill="#64748b" transform="rotate(12 16 16)"/>
  <rect x="7" y="3" width="18" height="24" rx="3" fill="#334155" transform="rotate(5 16 16)"/>
  <!-- Front card -->
  <rect x="6" y="4" width="18" height="24" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Title line -->
  <rect x="10" y="11" width="10" height="2" rx="1" fill="#1e293b"/>
  <!-- Content lines -->
  <rect x="10" y="16" width="8" height="1.5" rx="0.75" fill="#94a3b8"/>
  <rect x="10" y="20" width="6" height="1.5" rx="0.75" fill="#cbd5e1"/>
</svg>
